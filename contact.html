<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Hemant Bhatta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated background -->
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <header id="home" class="site-header">
      <div class="header-inner">
        <div class="brand">
          <img src="assets/hemant-bhatta-avatar.jpg" alt="Hemant avatar" class="header-avatar" onerror="this.src='HemantBhatta.jpg'" />
          <div class="title-wrap">
              <h1 class="name">Hemant Bhatta</h1>
              <p class="tagline">Entrepreneurship & Marketing</p>
          </div>
        </div>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="work.html">Work</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
        <button class="hamburger" aria-label="Open menu" id="hamburger">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <main class="container main-grid">
      <section class="contact scroll-reveal" id="contact">
        <h2>Let's Connect</h2>
        <p class="muted">Interested in collaborating or learning more? I'd love to hear from you.</p>
        <form class="contact-form" onsubmit="handleContact(event)">
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="email" name="email" placeholder="Email Address" required />
          <textarea name="message" rows="5" placeholder="How can we work together?" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Hemant Bhatta. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
